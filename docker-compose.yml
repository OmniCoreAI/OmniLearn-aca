name: omnilearn

# Full stack: Postgres + Redis + app (nginx → frontend + API + collab)
#   docker compose up --build
# App UI: http://localhost:8080

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: omnilearn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnilearn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnilearn}
      POSTGRES_DB: ${POSTGRES_DB:-omnilearn}
    volumes:
      - omnilearn_db_data:/var/lib/postgresql/data
    networks:
      - omnilearn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnilearn}"]
      interval: 5s
      timeout: 4s
      retries: 10

  redis:
    image: redis:7.2.3-alpine
    container_name: omnilearn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - omnilearn_redis_data:/data
    networks:
      - omnilearn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 4s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: omnilearn:local
    container_name: omnilearn-app
    restart: unless-stopped
    env_file:
      - docker/.env
    environment:
      # SQL URL comes from docker/.env (@db). Do not interpolate root .env (npm uses :5433).
      OMNILEARN_REDIS_CONNECTION_STRING: redis://redis:6379/omnilearn
      OMNILEARN_REDIS_URL: redis://redis:6379
      # In-container services talk to each other on localhost.
      OMNILEARN_API_URL: http://127.0.0.1:9000
      OMNILEARN_FRONTEND_DOMAIN: ${OMNILEARN_FRONTEND_DOMAIN:-localhost:${HTTP_PORT:-8080}}
      NEXT_PUBLIC_OMNILEARN_DOMAIN: ${OMNILEARN_FRONTEND_DOMAIN:-localhost:${HTTP_PORT:-8080}}
      # Next.js server routes call the API inside the same container.
      NEXT_PUBLIC_OMNILEARN_BACKEND_URL: http://127.0.0.1:9000
      OMNILEARN_INITIAL_ORG_NAME: ${OMNILEARN_INITIAL_ORG_NAME:-aca}
      OMNILEARN_INITIAL_ORG_SLUG: ${OMNILEARN_INITIAL_ORG_SLUG:-aca}
      OMNILEARN_INITIAL_ADMIN_EMAIL: ${OMNILEARN_INITIAL_ADMIN_EMAIL:-admin@omnicoreai.com}
      OMNILEARN_INITIAL_ADMIN_PASSWORD: ${OMNILEARN_INITIAL_ADMIN_PASSWORD:-change-me}
      COLLAB_PORT: ${COLLAB_PORT:-4040}
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - omnilearn_content:/app/api/content
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omnilearn-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  omnilearn-network:
    driver: bridge

volumes:
  omnilearn_db_data:
  omnilearn_redis_data:
  omnilearn_content:
