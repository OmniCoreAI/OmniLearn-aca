name: API Tests
permissions:
  contents: read
on:
  push:
    branches:
      - dev
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/api-tests.yaml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-tests.yaml"
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        # Exclude live Ollama opt-in tests; they only run locally with `-m ollama`.
        run: >
          uv run pytest src/tests/ -v --tb=short
          -m "not ollama"
          --cov=src
          --cov-report=html
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=25
        env:
          TESTING: "true"

      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: apps/api/coverage.xml
          flags: api
          name: api-coverage
          # Don't fail the job on upload/network/token issues — pytest already gates coverage.
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-coverage-report
          path: apps/api/htmlcov/
          retention-days: 30
