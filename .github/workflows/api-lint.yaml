name: API Lint
on:
  push:
    branches:
      - dev
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/api-lint.yaml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-lint.yaml"
permissions:
  contents: read
jobs:
  ruff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src
