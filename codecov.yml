codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        # Informational: pytest already enforces --cov-fail-under in CI.
        target: auto
        threshold: 2%
        informational: true
        flags:
          - api
    patch:
      default:
        target: auto
        threshold: 2%
        informational: true
        flags:
          - api
        if_ci_failed: success
        only_pulls: true

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: api
      paths:
        - apps/api/src

component_management:
  individual_components:
    - component_id: api
      name: API
      paths:
        - apps/api/src/**
